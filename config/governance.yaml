minio:
  endpoint: "${MINIO_ENDPOINT:-localhost:9000}"
  access_key: "${MINIO_ACCESS_KEY:-minioadmin}"
  secret_key: "${MINIO_SECRET_KEY:-minioadmin123}"
  secure: "${MINIO_SECURE:-false}"

bronze:
  bucket: "${MINIO_BUCKET:-jne-bronze}"
  # Example:
  # run_prefix: "bronze/jne/window_start=2026-04-01/window_end=2026-05-01/extract_date=2026-06-03/run_id=R_20260603T010203"
  run_prefix: "${BRONZE_RUN_PREFIX}"
  table_overrides: {}

governance:
  output_bucket: "${GOVERNANCE_OUTPUT_BUCKET:-jne-bronze}"
  output_prefix: "${GOVERNANCE_OUTPUT_PREFIX:-governance/jne/run_id=local}"
  orphan_key_limit: 10000

duckdb:
  memory_limit: "4GB"
  threads: 4

postgres:
  host: "${POSTGRES_HOST:-localhost}"
  port: "${POSTGRES_PORT:-5432}"
  database: "${POSTGRES_DB:-jne}"
  user: "${POSTGRES_USER:-jne}"
  password: "${POSTGRES_PASSWORD:-jne}"
  bronze_schema: "${POSTGRES_BRONZE_SCHEMA:-bronze}"
  governance_schema: "${POSTGRES_GOVERNANCE_SCHEMA:-governance}"

extraction_window:
  start: "${EXTRACTION_WINDOW_START:-}"
  end: "${EXTRACTION_WINDOW_END:-}"
