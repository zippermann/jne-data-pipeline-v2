# ============================================================
# Shared Airflow environment variables (reused via YAML anchor)
# ============================================================
x-airflow-env: &airflow-env
  AIRFLOW__CORE__EXECUTOR: LocalExecutor
  AIRFLOW__DATABASE__SQL_ALCHEMY_CONN: postgresql+psycopg2://airflow:airflow@airflow-postgres/airflow
  AIRFLOW__CORE__FERNET_KEY: ''
  AIRFLOW__CORE__DAGS_ARE_PAUSED_AT_CREATION: 'false'
  AIRFLOW__CORE__LOAD_EXAMPLES: 'false'
  AIRFLOW__API__AUTH_BACKENDS: 'airflow.api.auth.backend.basic_auth'
  # Automatically clean up task-log files older than 7 days so the
  # ./airflow/logs host directory does not accumulate across failed runs.
  AIRFLOW__LOG__LOG_RETENTION_DAYS: '7'
  # -- Scheduler health / heartbeat --
  # Increase heartbeat interval so the scheduler tolerates CPU-heavy tasks
  # running under LocalExecutor without being marked unhealthy.
  AIRFLOW__SCHEDULER__SCHEDULER_HEARTBEAT_SEC: '30'
  AIRFLOW__SCHEDULER__SCHEDULER_HEALTH_CHECK_THRESHOLD: '120'
  # Give long-running tasks more time before the job runner kills them
  # for missed heartbeats (default is 5 × heartbeat = 150 s with 30 s beat).
  AIRFLOW__SCHEDULER__JOB_HEARTBEAT_SEC: '30'
  AIRFLOW__SCHEDULER__LOCAL_TASK_JOB_HEARTBEAT_SEC: '30'

# Oracle env vars shared across Airflow services
x-oracle-env: &oracle-env
  ORACLE_HOST: ${ORACLE_HOST:-oracle-db}
  ORACLE_PORT: ${ORACLE_PORT:-1521}
  ORACLE_SID: ${ORACLE_SID:-}
  ORACLE_SERVICE: ${ORACLE_SERVICE:-}
  ORACLE_USER: ${ORACLE_USER:-HOA}
  ORACLE_PASSWORD: ${ORACLE_PASSWORD:-changeme}
  ORACLE_SCHEMA: ${ORACLE_SCHEMA:-JNE}
  BRONZE_WORKERS: ${BRONZE_WORKERS:-4}

x-minio-env: &minio-env
  MINIO_ENDPOINT: minio:9000
  MINIO_ACCESS_KEY: ${MINIO_ACCESS_KEY:-minioadmin}
  MINIO_SECRET_KEY: ${MINIO_SECRET_KEY:-minioadmin123}
  MINIO_BUCKET: ${MINIO_BUCKET:-jne-bronze}
  MINIO_SECURE: "false"

x-jne-postgres-env: &jne-postgres-env
  POSTGRES_HOST: jne-postgres
  POSTGRES_PORT: "5432"
  POSTGRES_DB: ${JNE_POSTGRES_DB:-jne}
  POSTGRES_USER: ${JNE_POSTGRES_USER:-jne}
  POSTGRES_PASSWORD: ${JNE_POSTGRES_PASSWORD:-jne}
  POSTGRES_BRONZE_SCHEMA: ${POSTGRES_BRONZE_SCHEMA:-bronze}
  POSTGRES_GOVERNANCE_SCHEMA: ${POSTGRES_GOVERNANCE_SCHEMA:-governance}

x-airflow-volumes: &airflow-volumes
  - .:/opt/airflow/project
  - ./airflow/dags:/opt/airflow/dags
  - ./airflow/logs:/opt/airflow/logs
  - ./airflow/plugins:/opt/airflow/plugins
  - ./data:/opt/airflow/data

services:
  # ============================================================
  # MinIO Object Storage (bronze data lake)
  # ============================================================
  minio:
    container_name: jne-minio
    image: minio/minio:RELEASE.2025-04-22T22-12-26Z
    restart: unless-stopped
    environment:
      MINIO_ROOT_USER: ${MINIO_ACCESS_KEY:-minioadmin}
      MINIO_ROOT_PASSWORD: ${MINIO_SECRET_KEY:-minioadmin123}
    ports:
      - "${MINIO_API_PORT:-9000}:9000"
      - "${MINIO_CONSOLE_PORT:-9001}:9001"
    volumes:
      - minio_data:/data
    command: server /data --console-address ":9001"
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9000/minio/health/live"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - jne-network

  # ============================================================
  # Airflow PostgreSQL (metadata DB, separate from data DB)
  # ============================================================
  airflow-postgres:
    container_name: jne-airflow-postgres
    image: postgres:15-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: airflow
      POSTGRES_PASSWORD: airflow
      POSTGRES_DB: airflow
    volumes:
      - airflow_postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U airflow -d airflow"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - jne-network

  # ============================================================
  # JNE PostgreSQL (queryable bronze + governance result tables)
  # ============================================================
  jne-postgres:
    container_name: jne-postgres
    image: postgres:15-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${JNE_POSTGRES_USER:-jne}
      POSTGRES_PASSWORD: ${JNE_POSTGRES_PASSWORD:-jne}
      POSTGRES_DB: ${JNE_POSTGRES_DB:-jne}
    ports:
      - "${JNE_POSTGRES_PORT:-5432}:5432"
    volumes:
      - jne_postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${JNE_POSTGRES_USER:-jne} -d ${JNE_POSTGRES_DB:-jne}"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - jne-network

  # ============================================================
  # Airflow Init (one-shot: db migrate + create admin user)
  # ============================================================
  airflow-init:
    container_name: jne-airflow-init
    build:
      context: .
      dockerfile: Dockerfile.airflow
    depends_on:
      airflow-postgres:
        condition: service_healthy
      minio:
        condition: service_healthy
      jne-postgres:
        condition: service_healthy
    environment:
      <<: *airflow-env
      _AIRFLOW_ADMIN_USER: ${AIRFLOW_ADMIN_USER:-admin}
      _AIRFLOW_ADMIN_PASSWORD: ${AIRFLOW_ADMIN_PASSWORD:-admin}
    volumes: *airflow-volumes
    command: bash -c "airflow db migrate && airflow users create --username $$_AIRFLOW_ADMIN_USER --password $$_AIRFLOW_ADMIN_PASSWORD --firstname Admin --lastname User --role Admin --email admin@jne.local || true"
    restart: "no"
    networks:
      - jne-network

  # ============================================================
  # Data Init (one-shot: bronze extract)
  # Hidden behind profile — not started by 'docker compose up'.
  # Run explicitly with:
  #   docker compose --profile init up data-init
  # ============================================================
  data-init:
    container_name: jne-data-init
    profiles: [init]
    build:
      context: .
      dockerfile: Dockerfile.airflow
    depends_on:
      airflow-postgres:
        condition: service_healthy
      minio:
        condition: service_healthy
      jne-postgres:
        condition: service_healthy
    environment:
      <<: [*oracle-env, *minio-env, *jne-postgres-env]
    volumes: *airflow-volumes
    command: >-
      bash -c "cd /opt/airflow/project && python -m src.bronze --config config/config.yaml --run-id bronze_init_$$(date -u +%Y%m%dT%H%M%S)"
    restart: "no"
    networks:
      - jne-network

  # ============================================================
  # Airflow Webserver
  # ============================================================
  airflow-webserver:
    container_name: jne-airflow-webserver
    build:
      context: .
      dockerfile: Dockerfile.airflow
    restart: unless-stopped
    depends_on:
      airflow-init:
        condition: service_completed_successfully
      minio:
        condition: service_healthy
      jne-postgres:
        condition: service_healthy
    environment:
      <<: [*airflow-env, *oracle-env, *minio-env, *jne-postgres-env]
      AIRFLOW__WEBSERVER__RBAC: "True"
    volumes: *airflow-volumes
    ports:
      - "${AIRFLOW_PORT:-8080}:8080"
    command: webserver
    networks:
      - jne-network

  # ============================================================
  # Airflow Scheduler
  # ============================================================
  airflow-scheduler:
    container_name: jne-airflow-scheduler
    build:
      context: .
      dockerfile: Dockerfile.airflow
    restart: unless-stopped
    depends_on:
      airflow-init:
        condition: service_completed_successfully
      minio:
        condition: service_healthy
      jne-postgres:
        condition: service_healthy
    deploy:
      resources:
        limits:
          cpus: '4'
          memory: 8G
        reservations:
          cpus: '2'
          memory: 4G
    environment:
      <<: [*airflow-env, *oracle-env, *minio-env, *jne-postgres-env]
    volumes: *airflow-volumes
    command: scheduler
    networks:
      - jne-network

# Persistent storage volumes
volumes:
  minio_data:
    name: jne-minio-data
  airflow_postgres_data:
  jne_postgres_data:

# Docker network for service communication
networks:
  jne-network:
    name: jne-pipeline-network
    driver: bridge
