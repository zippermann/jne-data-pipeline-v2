# Oracle table manifest for the bronze extract layer.
# Each entry: oracle (source table name) → out (Parquet output name) + pk (ORDER BY / future incremental).
# pk values sourced from governance config.py PRIMARY_KEYS (converted to uppercase for Oracle).
# pk: null where not present in governance PRIMARY_KEYS or genuinely unknown.
#
# Total: 38 tables (31 from AGENTS.md letter map A–AE + 7 additional).

tables:
  # --- Letter A: CMS_APICUST ---
  - oracle: CMS_APICUST
    out: apicust
    pk: APICUST_ORDER_ID

  # --- Letter B: CMS_CNOTE ---
  - oracle: CMS_CNOTE
    out: cnote
    pk: CNOTE_NO

  # --- Letter C: CMS_MRCNOTE ---
  - oracle: CMS_MRCNOTE
    out: mrcnote
    pk: MRCNOTE_NO

  # --- Letter D: CMS_DRCNOTE ---
  - oracle: CMS_DRCNOTE
    out: drcnote
    pk: DRCNOTE_NO

  # --- Letter E: CMS_MHI_HOC (flat prefix: mhi_) ---
  - oracle: CMS_MHI_HOC
    out: mhihoc
    pk: MHI_HOC_NO

  # --- Letter F: CMS_DHI_HOC (flat prefix: dhi_) ---
  - oracle: CMS_DHI_HOC
    out: dhihoc
    pk: DHI_NO

  # --- Letter G: CMS_DSTATUS ---
  - oracle: CMS_DSTATUS
    out: dstatus
    pk: DSTATUS_NO

  # --- Letter H: CMS_MANIFEST ---
  - oracle: CMS_MANIFEST
    out: manifest
    pk: MANIFEST_NO

  # --- Letter I: CMS_MFCNOTE ---
  # NOTE: In the old flat table this was pivoted into 5 prefixes (om_, tm1_, tm2_, im_, hm_).
  # Bronze extracts it as-is — one row per manifest line.
  - oracle: CMS_MFCNOTE
    out: mfcnote
    # Composite PK — interpolated directly into ORDER BY as a comma-separated string.
    # Not usable for incremental extracts until silver splits on a single key.
    pk: "MFCNOTE_MAN_NO, MFCNOTE_BAG_NO, MFCNOTE_NO"

  # --- Letter J: CMS_MFBAG ---
  - oracle: CMS_MFBAG
    out: mfbag
    pk: MFBAG_NO

  # --- Letter K: CMS_DMBAG ---
  - oracle: CMS_DMBAG
    out: dmbag
    pk: DMBAG_NO

  # --- Letter L: CMS_MMBAG ---
  - oracle: CMS_MMBAG
    out: mmbag
    pk: MMBAG_NO

  # --- Letter M: CMS_DSMU ---
  - oracle: CMS_DSMU
    out: dsmu
    pk: DSMU_NO

  # --- Letter N: CMS_MSMU ---
  - oracle: CMS_MSMU
    out: msmu
    pk: MSMU_NO

  # --- Letter O: CMS_DRSHEET_PRA ---
  - oracle: CMS_DRSHEET_PRA
    out: drsheet_pra
    pk: DRSHEET_PRA_NO

  # --- Letter P: CMS_DRSHEET ---
  - oracle: CMS_DRSHEET
    out: drsheet
    pk: DRSHEET_NO

  # --- Letter Q: CMS_MRSHEET ---
  - oracle: CMS_MRSHEET
    out: mrsheet
    pk: MRSHEET_NO

  # --- Letter R: CMS_CNOTE_POD ---
  - oracle: CMS_CNOTE_POD
    out: cnote_pod
    pk: CNOTE_POD_NO

  # --- Letter S: CMS_DHOV_RSHEET ---
  - oracle: CMS_DHOV_RSHEET
    out: dhov_rsheet
    pk: DHOV_RSHEET_NO

  # --- Letter T: CMS_MHOUNDEL_POD ---
  - oracle: CMS_MHOUNDEL_POD
    out: mhoundel_pod
    pk: MHOUNDEL_NO

  # --- Letter U: CMS_DHOUNDEL_POD ---
  - oracle: CMS_DHOUNDEL_POD
    out: dhoundel_pod
    pk: DHOUNDEL_NO

  # --- Letter V: CMS_MHOCNOTE ---
  - oracle: CMS_MHOCNOTE
    out: mhocnote
    pk: MHOCNOTE_NO

  # --- Letter W: CMS_DHOCNOTE ---
  - oracle: CMS_DHOCNOTE
    out: dhocnote
    pk: DHOCNOTE_NO

  # --- Letter X: CMS_COST_MTRANSIT_AGEN (flat prefix: cost_m_) ---
  - oracle: CMS_COST_MTRANSIT_AGEN
    out: cost_mtransit
    pk: COST_M_MANIFEST_NO

  # --- Letter Y: CMS_COST_DTRANSIT_AGEN (flat prefix: cost_d_) ---
  - oracle: CMS_COST_DTRANSIT_AGEN
    out: cost_dtransit
    pk: COST_D_MANIFEST_NO

  # --- Letter Z: CMS_MSJ ---
  - oracle: CMS_MSJ
    out: msj
    pk: MSJ_NO

  # --- Letter AA: CMS_DSJ ---
  - oracle: CMS_DSJ
    out: dsj
    pk: DSJ_NO

  # --- Letter AB: CMS_MHICNOTE (flat prefix: mhicnote_) ---
  - oracle: CMS_MHICNOTE
    out: mhicnote
    pk: MHICNOTE_NO

  # --- Letter AC: CMS_DHICNOTE (flat prefix: dhicnote_) ---
  - oracle: CMS_DHICNOTE
    out: dhicnote
    pk: DHICNOTE_NO

  # --- Letter AD: CMS_RDSJ ---
  - oracle: CMS_RDSJ
    out: rdsj
    pk: RDSJ_NO

  # --- Letter AE: CMS_DBAG_HO ---
  - oracle: CMS_DBAG_HO
    out: dbag_ho
    pk: DBAG_HO_NO

  # --- Previously business-excluded tables (extract raw at bronze; exclusions belong in silver) ---

  # CMS_CNOTE_AMO: extension table keyed on cnote_no (same PK as CMS_CNOTE)
  - oracle: CMS_CNOTE_AMO
    out: cnote_amo
    pk: CNOTE_NO

  - oracle: LASTMILE_COURIER
    out: lastmile_courier
    pk: COURIER_ID

  - oracle: T_MDT_CITY_ORIGIN
    out: t_mdt_city_origin
    pk: null  # reference/lookup table — no surrogate PK needed for ordering

  - oracle: ORA_ZONE
    out: ora_zone
    pk: null  # reference/lookup table — no surrogate PK needed for ordering

  - oracle: ORA_USER
    out: ora_user
    pk: null  # reference/lookup table — no surrogate PK needed for ordering

  # --- Reference tables used by DQ governance ---
  - oracle: CMS_DROURATE
    out: drourate
    pk: null  # reference/lookup table — used for ACCU5A6/ACCU6B6 service-code checks

  - oracle: CMS_DCORRECT_DESTINATION
    out: dcorrect_destination
    pk: null  # TODO confirm PK; used for deferred ACCU2B12/ACCU3B13 destination checks
